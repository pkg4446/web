<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내비게이션 센터</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        p.subtitle {
            margin-bottom: 50px;
            opacity: 0.8;
            font-weight: 300;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .menu-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-item:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .menu-item h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .menu-item p {
            font-size: 0.9rem;
            opacity: 0.7;
            line-height: 1.5;
        }

        /* 반응형 조절 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">이동하실 페이지를 선택해 주세요.</p>

        <nav class="menu-grid">
            <a href="" class="menu-item">
                <div class="icon">🏠</div>
                <h2>홈페이지</h2>
                <p>메인 화면으로 이동하여 최신 소식을 확인하세요.</p>
            </a>
            <a href="" class="menu-item">
                <div class="icon">🏠</div>
                <h2>홈페이지</h2>
                <p>메인 화면으로 이동하여 최신 소식을 확인하세요.</p>
            </a>
        </nav>
    </div>

</body>
</html>
